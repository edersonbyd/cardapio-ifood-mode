<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cardápio Digital</title>
  <meta name="description" content="Cardápio digital online — peça pelo WhatsApp." />
  <link rel="stylesheet" href="/menu.css" />
</head>
<body>
  <header class="header">
    <div class="container header-inner">
      <div class="brand">
        <span class="logo">🧁</span>
        <div>
          <h1>Confeitaria Amanda Santos</h1>
          <p>Peça pelo WhatsApp</p>
        </div>
      </div>
    </div>
  </header>

  <nav class="categories container" id="categories"></nav>

  <main class="container">
    <div id="status" class="status"></div>
    <section id="products" class="grid"></section>
  </main>

  <!-- Drawer sacola -->
  <aside id="cart-drawer" class="drawer" aria-hidden="true">
    <div class="drawer-header">
      <div class="drawer-title">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M6 2 3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4Z"/>
          <path d="M3 6h18"/>
          <path d="M16 10a4 4 0 0 1-8 0"/>
        </svg>
        <h2>Minha sacola</h2>
        <span id="drawer-count" class="drawer-count">0</span>
      </div>
      <button id="close-cart" class="icon-btn" aria-label="Fechar" style="display:none">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg>
      </button>
    </div>

    <div id="cart-items" class="cart-items"></div>

    <div class="drawer-footer">
      <!-- Entrega -->
      <div class="section-title">Como deseja receber?</div>
      <div class="option-group" id="delivery-group">
        <button class="opt-card active" data-delivery="retirar">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9h18l-2 11H5L3 9Z"/><path d="M8 9V6a4 4 0 0 1 8 0v3"/></svg>
          <span>Retirar no local</span>
        </button>
        <button class="opt-card" data-delivery="delivery">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 17h11V6H3v8a3 3 0 0 0 3 3Z"/><path d="M16 8h4l3 4v5h-3"/><circle cx="7.5" cy="17.5" r="2.5"/><circle cx="17.5" cy="17.5" r="2.5"/></svg>
          <span>Delivery</span>
        </button>
      </div>

      <!-- Pagamento -->
      <div class="section-title">Forma de pagamento</div>
      <div class="option-group pay" id="payment-group">
        <button class="opt-card" data-payment="PIX">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m3 12 9-9 9 9-9 9-9-9Z"/><path d="m7 12 5-5 5 5-5 5-5-5Z"/></svg>
          <span>PIX</span>
        </button>
        <button class="opt-card" data-payment="Crédito">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="5" width="20" height="14" rx="2"/><path d="M2 10h20"/><path d="M6 15h4"/></svg>
          <span>Crédito</span>
        </button>
        <button class="opt-card" data-payment="Débito">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="5" width="20" height="14" rx="2"/><path d="M2 10h20"/><path d="M14 15h4"/></svg>
          <span>Débito</span>
        </button>
        <button class="opt-card" data-payment="Dinheiro">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="6" width="20" height="12" rx="2"/><circle cx="12" cy="12" r="3"/></svg>
          <span>Dinheiro</span>
        </button>
      </div>

      <!-- Resumo -->
      <div class="summary">
        <div class="sum-row"><span>Subtotal</span><span id="cart-subtotal">R$ 0,00</span></div>
        <div class="sum-row total"><span>Total</span><strong id="cart-total">R$ 0,00</strong></div>
      </div>

      <button id="checkout-btn" class="btn btn-primary btn-checkout">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5Z"/></svg>
        Finalizar pelo WhatsApp
      </button>
    </div>
  </aside>
  <div id="overlay" class="overlay"></div>

  <button id="cart-btn" class="cart-fab" aria-label="Ver sacola">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M6 2 3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4Z"/>
      <path d="M3 6h18"/>
      <path d="M16 10a4 4 0 0 1-8 0"/>
    </svg>
    <span>Ver Sacola</span>
    <span id="cart-count" class="badge">0</span>
  </button>

  <div id="toast" class="toast" role="status" aria-live="polite"></div>

  <script src="/menu.js"></script>
</body>
</html>
